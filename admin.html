<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo - CEMO</title>
    <link rel="stylesheet" href="style.css">

    <style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

.admin-page{
    min-height:100vh;
    background:
    linear-gradient(
    135deg,
    #0f172a,
    #1e3a8a,
    #0ea5e9
    );
    color:white;
}

.topbar{
    position:sticky;
    top:0;
    z-index:999;
    background:rgba(15,23,42,.85);
    backdrop-filter:blur(15px);
    border-bottom:1px solid rgba(255,255,255,.08);
    padding:20px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.topbar h1{
    color:#ffffff;
    font-size:1.8rem;
    font-weight:700;
}

.logout{
    background:linear-gradient(
    135deg,
    #dc2626,
    #ef4444
    );
    color:white;
    border:none;
    padding:12px 22px;
    border-radius:12px;
    cursor:pointer;
    transition:.3s;
}

.logout:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 25px rgba(220,38,38,.4);
}

.dashboard{
    max-width:1400px;
    margin:auto;
    padding:40px;
}

.cards-admin{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
}

.card-admin{
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.1);
    border-radius:24px;
    padding:30px;
    transition:.3s;
    box-shadow:0 10px 30px rgba(0,0,0,.15);
}

.card-admin:hover{
    transform:translateY(-6px);
    box-shadow:0 20px 40px rgba(0,0,0,.25);
}

.card-admin h2{
    font-size:2.3rem;
    margin-bottom:10px;
    color:#ffffff;
}

.card-admin p{
    color:rgba(255,255,255,.75);
    font-size:.95rem;
}

.section-admin{
    margin-top:35px;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.1);
    border-radius:24px;
    padding:35px;
    box-shadow:0 10px 30px rgba(0,0,0,.15);
}

.section-admin h2{
    font-size:2rem;
    margin-bottom:25px;
    color:white;
}

input,
textarea,
select{
    width:100%;
    padding:16px;
    margin-bottom:15px;
    border:1px solid rgba(255,255,255,.1);
    border-radius:14px;
    background:rgba(255,255,255,.08);
    color:white;
    outline:none;
    transition:.3s;
}

input::placeholder,
textarea::placeholder{
    color:rgba(255,255,255,.55);
}

input:focus,
textarea:focus,
select:focus{
    border-color:#38bdf8;
    box-shadow:0 0 25px rgba(56,189,248,.25);
}

textarea{
    min-height:140px;
    resize:vertical;
}

button{
    background:linear-gradient(
    135deg,
    #0ea5e9,
    #38bdf8
    );
    color:white;
    border:none;
    padding:16px 28px;
    border-radius:14px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 25px rgba(56,189,248,.4);
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
    overflow:hidden;
    border-radius:18px;
}

table th{
    background:rgba(255,255,255,.08);
    color:#ffffff;
    padding:18px;
    text-align:left;
}

table td{
    padding:18px;
    color:rgba(255,255,255,.85);
    border-bottom:1px solid rgba(255,255,255,.08);
}

table tr:hover{
    background:rgba(255,255,255,.04);
}

.editar{
    background:linear-gradient(
    135deg,
    #f59e0b,
    #fbbf24
    );
    color:black;
    margin-right:10px;
}

.excluir{
    background:linear-gradient(
    135deg,
    #dc2626,
    #ef4444
    );
    color:white;
}

.editar:hover,
.excluir:hover{
    transform:translateY(-2px);
}

@media(max-width:768px){

    .dashboard{
        padding:20px;
    }

    .topbar{
        padding:15px 20px;
        flex-direction:column;
        gap:15px;
    }

    .topbar h1{
        text-align:center;
        font-size:1.4rem;
    }

    .section-admin{
        padding:20px;
    }

}
</style>
</head>

<body>

    <script>
        if (localStorage.getItem("logado") !== "true") {
            window.location = "login.html";
        }
    </script>

    <div class="admin-page">
        <div class="topbar">
            <h1>Painel Administrativo CEMO</h1>
            <button class="logout" onclick="logout()">Sair</button>
        </div>

        <div class="dashboard">
            <div class="cards-admin">
                <div class="card-admin">
                    <h2>12</h2>
                    <p>Imóveis cadastrados</p>
                </div>
                <div class="card-admin">
                    <h2>48</h2>
                    <p>Avaliações recebidas</p>
                </div>
                <div class="card-admin">
                    <h2>5.0 ⭐</h2>
                    <p>Nota média</p>
                </div>
                <div class="card-admin">
                    <h2>98%</h2>
                    <p>Clientes satisfeitos</p>
                </div>
            </div>

            <div class="section-admin">
                <h2>Cadastrar Imóvel</h2>
                
                <form id="form-cadastro">
                    <input id="titulo" type="text" placeholder="Título do imóvel" required>
                    <input id="preco" type="text" placeholder="Preço" required>
                    <input id="endereco" type="text" placeholder="Endereço" required>
                    <textarea id="descricao" placeholder="Descrição do imóvel" required></textarea>
                    <input id="midia" type="file" accept="image/*,video/*">

                    <button type="button" onclick="cadastrarImovel()">Cadastrar Imóvel</button>
                </form>
            </div>

            <div class="section-admin">
                <h2>Gerenciar Imóveis</h2>
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Imóvel</th>
                            <th>Preço</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="lista-imoveis"></tbody>
                </table>
            </div>

            <div class="section-admin">
                <h2>Avaliações dos Clientes</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>Nota</th>
                            <th>Comentário</th>
                        </tr>
                    </thead>
                    <tbody id="lista-avaliacoes"></tbody>
                </table>
            </div>

        </div>
    </div>

    <script>
        function logout() {
            localStorage.removeItem("logado");
            window.location = "login.html";
        }
    </script>


    <script src="admin.js"></script>
</body>

</html>
